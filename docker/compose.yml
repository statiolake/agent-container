services:
  proxy:
    image: agent-container-proxy:dev
    networks:
      - jail
      - egress
    extra_hosts:
      # Needed so the forward proxy can route the container's refresh
      # script back to the Rust broker on the host.
      - "host.docker.internal:host-gateway"
    volumes:
      - "${ALLOWLIST_PATH}:/etc/tinyproxy/allowlist.txt:ro"
    restart: "no"

  agent:
    image: agent-container:dev
    depends_on:
      proxy:
        condition: service_started
    networks:
      - jail
    environment:
      - HTTP_PROXY=http://proxy:8888
      - HTTPS_PROXY=http://proxy:8888
      - http_proxy=http://proxy:8888
      - https_proxy=http://proxy:8888
      - NO_PROXY=localhost,127.0.0.1,proxy
      - no_proxy=localhost,127.0.0.1,proxy
      - IS_SANDBOX=1
      - TINI_SUBREAPER=1
      # Inherit the host terminal so the in-container TUIs (Claude Code,
      # Codex) pick the right colour palette. Sensible defaults for
      # non-interactive or unknown hosts.
      - TERM=${TERM:-xterm-256color}
      - COLORTERM=${COLORTERM:-truecolor}
      # Bedrock pathway. Credentials themselves never travel through env
      # vars — the container's awsCredentialExport command fetches them
      # from the broker on demand. AWS_PROFILE / AWS_ACCESS_KEY_ID /
      # AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN are intentionally NOT
      # forwarded so the host's own AWS environment can't hijack which
      # account the container transacts against.
      - CLAUDE_CODE_USE_BEDROCK=${CLAUDE_CODE_USE_BEDROCK:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      - AGENT_CONTAINER_HOST_ENDPOINT=${AGENT_CONTAINER_HOST_ENDPOINT}
    volumes:
      # Persistent $HOME so onboarding, login, settings, and Claude Code's
      # ~/.claude.json survive across runs. Specific sub-mounts below
      # override individual paths that must stay ephemeral or workspace-scoped.
      - "${CONTAINER_HOME_PATH}:/home/agent"
      - "${WORKSPACE_PATH}:/workspace"
      - "${HOST_PROJECT_DIR}:/home/agent/.claude/projects/-workspace"
      - "${CREDENTIALS_PATH}:/home/agent/.claude/.credentials.json"
      - "${CLAUDE_MD_MOUNT_SRC}:/home/agent/.claude/CLAUDE.md:ro"
      - "${CODEX_AUTH_PATH}:/home/agent/.codex/auth.json"
    user: "${HOST_UID}:${HOST_GID}"
    working_dir: /workspace
    stdin_open: true
    tty: true
    init: true

networks:
  jail:
    driver: bridge
    internal: true
  egress:
    driver: bridge
