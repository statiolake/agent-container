User nobody
Group nobody
Port 8888
Listen 0.0.0.0
Timeout 600
LogLevel Info
MaxClients 100
StartServers 5
MinSpareServers 2
MaxSpareServers 10
PidFile "/var/run/tinyproxy/tinyproxy.pid"

# Phase 2: allow the agent container's jail subnet to use the proxy.
# Docker allocates /16 ranges to user-defined bridges; permit both common
# ranges so the default bridge subnet is reachable regardless of allocation.
Allow 172.16.0.0/12
Allow 10.0.0.0/8
Allow 192.168.0.0/16

# Only tunnel HTTPS (443) and plain HTTP (80) via CONNECT. No MITM.
ConnectPort 443
ConnectPort 80

# Hostname allowlist. The file is written at runtime by the CLI from
# `settings.proxy.allow` (see src/proxy_allowlist.rs) and bind-mounted in.
Filter "/etc/tinyproxy/allowlist.txt"
FilterDefaultDeny Yes
FilterURLs Off
FilterExtended On
FilterCaseSensitive Off
